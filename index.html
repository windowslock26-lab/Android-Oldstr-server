<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Oldstr - APK Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2em;
        }

        .error {
            background-color: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .app-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .app-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }

        .app-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 40px;
        }

        .app-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .app-version {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .app-date {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .app-files {
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .file-item {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #555;
        }

        .file-size {
            color: #999;
            font-size: 0.85em;
            margin-top: 4px;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: opacity 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .download-btn:hover {
            opacity: 0.9;
        }

        .download-btn:active {
            opacity: 0.8;
        }

        .no-apps {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2em;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 20px;
            font-size: 0.9em;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .apps-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Android Oldstr Store</h1>
            <p>Retro Android Applications</p>
        </div>

        <div id="content">
            <div class="loading">Loading applications...</div>
        </div>

        <div class="footer">
            <p>Last updated: <span id="lastUpdate">-</span></p>
            <p>© 2026 Android Oldstr - Powered by GitHub Releases</p>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'windowslock26-lab';
        const REPO_NAME = 'Android-Oldstr-server';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases`;

        async function fetchReleases() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const releases = await response.json();
                displayReleases(releases);
                updateLastModified();
            } catch (error) {
                showError(`Failed to load applications: ${error.message}`);
                console.error('Error:', error);
            }
        }

        function displayReleases(releases) {
            const content = document.getElementById('content');
            
            // Filter releases with APK assets
            const appsWithAssets = releases.filter(release => 
                release.assets && release.assets.some(asset => 
                    asset.name.toLowerCase().endsWith('.apk')
                )
            );

            if (appsWithAssets.length === 0) {
                content.innerHTML = '<div class="no-apps">No APK files found in releases. Upload APKs to GitHub releases to display them here.</div>';
                return;
            }

            const appsHTML = appsWithAssets.map(release => {
                const apkAssets = release.assets.filter(asset => 
                    asset.name.toLowerCase().endsWith('.apk')
                );

                const appName = release.name || release.tag_name;
                const version = release.tag_name;
                const releaseDate = new Date(release.published_at).toLocaleDateString();

                const filesHTML = apkAssets.map(asset => {
                    const sizeInMB = (asset.size / (1024 * 1024)).toFixed(2);
                    return `
                        <div class="file-item">
                            <strong>${asset.name}</strong>
                            <div class="file-size">${sizeInMB} MB • ${asset.download_count} downloads</div>
                        </div>
                    `;
                }).join('');

                const downloadLink = apkAssets[0].browser_download_url;

                return `
                    <div class="app-card">
                        <div class="app-icon">📦</div>
                        <div class="app-name">${escapeHtml(appName)}</div>
                        <div class="app-version">Version: ${escapeHtml(version)}</div>
                        <div class="app-date">Released: ${releaseDate}</div>
                        <div class="app-files">${filesHTML}</div>
                        <a href="${downloadLink}" class="download-btn" download>Download APK</a>
                    </div>
                `;
            }).join('');

            content.innerHTML = `<div class="apps-grid">${appsHTML}</div>`;
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function updateLastModified() {
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load releases on page load
        window.addEventListener('DOMContentLoaded', fetchReleases);

        // Refresh every 5 minutes
        setInterval(fetchReleases, 5 * 60 * 1000);
    </script>
</body>
</html>

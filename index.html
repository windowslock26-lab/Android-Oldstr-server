<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Android Oldstr - APK Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #4a3f8f;
            background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            line-height: 1.4;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 5px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            padding: 20px 10px;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.3);
            word-wrap: break-word;
        }

        .header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 30px 10px;
            font-size: 1em;
        }

        .error {
            background-color: #d9534f;
            color: white;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            border-radius: 4px;
            font-size: 0.95em;
            word-wrap: break-word;
        }

        .apps-list {
            margin-bottom: 20px;
        }

        .app-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 32px;
            flex-shrink: 0;
        }

        .app-info {
            margin-bottom: 10px;
        }

        .app-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .app-version {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 3px;
        }

        .app-date {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        .app-files {
            margin-bottom: 10px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            border-left: 4px solid #667eea;
        }

        .file-item {
            padding: 8px 0;
            font-size: 0.9em;
            color: #555;
            border-bottom: 1px solid #eee;
            word-wrap: break-word;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-name {
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }

        .file-size {
            color: #999;
            font-size: 0.85em;
        }

        .download-section {
            margin-top: 15px;
        }

        .progress-container {
            display: none;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.85em;
            color: #666;
            text-align: center;
        }

        .status-message {
            font-size: 0.9em;
            color: #28a745;
            text-align: center;
            margin-bottom: 10px;
            display: none;
        }

        .status-message.error-msg {
            color: #d9534f;
        }

        .status-message.warning-msg {
            color: #f0ad4e;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            text-decoration: none;
            display: block;
            text-align: center;
            width: 100%;
            -webkit-appearance: none;
            -webkit-border-radius: 4px;
            -webkit-tap-highlight-color: rgba(0,0,0,0.1);
        }

        .download-btn:active {
            opacity: 0.8;
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .download-btn.downloading {
            background: #f0ad4e;
        }

        .download-btn.completed {
            background: #28a745;
        }

        .no-apps {
            text-align: center;
            color: white;
            padding: 30px 10px;
            font-size: 1em;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 15px 10px;
            font-size: 0.85em;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .footer-text {
            word-wrap: break-word;
            margin: 5px 0;
        }

        @media screen and (max-width: 480px) {
            .header h1 {
                font-size: 1.5em;
            }

            .header p {
                font-size: 0.95em;
            }

            .app-card {
                padding: 12px;
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Android Oldstr Store</h1>
            <p>Retro Android Applications</p>
        </div>

        <div id="content">
            <div class="loading">Loading applications...</div>
        </div>

        <div class="footer">
            <div class="footer-text">Last updated: <span id="lastUpdate">-</span></div>
            <div class="footer-text">Android Oldstr - Powered by GitHub</div>
        </div>
    </div>

    <script>
        var REPO_OWNER = 'windowslock26-lab';
        var REPO_NAME = 'Android-Oldstr-server';
        var API_URL = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/releases';
        var downloadStates = {};

        function fetchReleases() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_URL, true);
            xhr.timeout = 10000;
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var releases = JSON.parse(xhr.responseText);
                        displayReleases(releases);
                        updateLastModified();
                    } catch(e) {
                        showError('Error parsing data: ' + e.message);
                    }
                } else {
                    showError('Failed to load: HTTP ' + xhr.status);
                }
            };

            xhr.onerror = function() {
                showError('Network error. Check your connection.');
            };

            xhr.ontimeout = function() {
                showError('Request timeout. Please try again.');
            };

            xhr.send();
        }

        function displayReleases(releases) {
            var content = document.getElementById('content');
            var appsWithAssets = [];

            for (var i = 0; i < releases.length; i++) {
                var release = releases[i];
                if (release.assets && release.assets.length > 0) {
                    var hasApk = false;
                    for (var j = 0; j < release.assets.length; j++) {
                        if (release.assets[j].name.toLowerCase().indexOf('.apk') !== -1) {
                            hasApk = true;
                            break;
                        }
                    }
                    if (hasApk) {
                        appsWithAssets.push(release);
                    }
                }
            }

            if (appsWithAssets.length === 0) {
                content.innerHTML = '<div class="no-apps">No APK files found in releases.<br>Upload APKs to GitHub releases to display them here.</div>';
                return;
            }

            var appsHTML = '';
            for (var i = 0; i < appsWithAssets.length; i++) {
                var release = appsWithAssets[i];
                var apkAssets = [];
                
                for (var j = 0; j < release.assets.length; j++) {
                    if (release.assets[j].name.toLowerCase().indexOf('.apk') !== -1) {
                        apkAssets.push(release.assets[j]);
                    }
                }

                var appName = release.name || release.tag_name;
                var version = release.tag_name;
                var releaseDate = new Date(release.published_at).toLocaleDateString();
                var downloadId = 'download-' + i;

                var filesHTML = '';
                for (var j = 0; j < apkAssets.length; j++) {
                    var asset = apkAssets[j];
                    var sizeInMB = (asset.size / (1024 * 1024)).toFixed(2);
                    filesHTML += '<div class="file-item">' +
                        '<span class="file-name">' + escapeHtml(asset.name) + '</span>' +
                        '<span class="file-size">' + sizeInMB + ' MB</span>' +
                        '</div>';
                }

                var downloadLink = apkAssets[0].browser_download_url;
                var fileSize = apkAssets[0].size;

                appsHTML += '<div class="app-card">' +
                    '<div class="app-icon">📦</div>' +
                    '<div class="app-info">' +
                    '<div class="app-name">' + escapeHtml(appName) + '</div>' +
                    '<div class="app-version">Version: ' + escapeHtml(version) + '</div>' +
                    '<div class="app-date">Released: ' + releaseDate + '</div>' +
                    '</div>' +
                    '<div class="app-files">' + filesHTML + '</div>' +
                    '<div class="download-section">' +
                    '<div class="status-message" id="status-' + downloadId + '"></div>' +
                    '<div class="progress-container" id="progress-container-' + downloadId + '">' +
                    '<div class="progress-bar">' +
                    '<div class="progress-fill" id="progress-fill-' + downloadId + '"></div>' +
                    '</div>' +
                    '<div class="progress-text" id="progress-text-' + downloadId + '">0%</div>' +
                    '</div>' +
                    '<button class="download-btn" id="btn-' + downloadId + '" onclick="startDownload(\'' + downloadLink + '\', \'' + downloadId + '\', ' + fileSize + ')">Download APK</button>' +
                    '</div>' +
                    '</div>';
            }

            content.innerHTML = '<div class="apps-list">' + appsHTML + '</div>';
        }

        function startDownload(url, downloadId, fileSize) {
            var button = document.getElementById('btn-' + downloadId);
            var progressContainer = document.getElementById('progress-container-' + downloadId);
            var statusMessage = document.getElementById('status-' + downloadId);

            if (button.classList.contains('completed')) {
                // If already downloaded, trigger re-download
                triggerDownload(url);
                return;
            }

            if (downloadStates[downloadId]) {
                return; // Already downloading
            }

            downloadStates[downloadId] = true;
            button.disabled = true;
            button.classList.add('downloading');
            button.textContent = 'Downloading...';
            progressContainer.style.display = 'block';
            statusMessage.style.display = 'none';

            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'blob';

            xhr.onprogress = function(e) {
                if (e.lengthComputable) {
                    var percentComplete = (e.loaded / e.total) * 100;
                    document.getElementById('progress-fill-' + downloadId).style.width = percentComplete + '%';
                    document.getElementById('progress-text-' + downloadId).textContent = Math.round(percentComplete) + '%';
                }
            };

            xhr.onload = function() {
                if (xhr.status === 200) {
                    var blob = xhr.response;
                    var filename = url.split('/').pop();
                    
                    // Create download link
                    var link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);

                    // Update UI
                    downloadStates[downloadId] = false;
                    button.classList.remove('downloading');
                    button.classList.add('completed');
                    button.textContent = 'Downloaded ✓';
                    progressContainer.style.display = 'none';
                    
                    statusMessage.textContent = 'Downloaded successfully!';
                    statusMessage.classList.remove('error-msg', 'warning-msg');
                    statusMessage.style.display = 'block';
                } else {
                    handleDownloadError(downloadId, 'HTTP ' + xhr.status);
                }
            };

            xhr.onerror = function() {
                handleDownloadError(downloadId, 'Network error. Try again.');
            };

            xhr.ontimeout = function() {
                handleDownloadError(downloadId, 'Download timeout. Try again.');
            };

            xhr.send();
        }

        function handleDownloadError(downloadId, errorMsg) {
            var button = document.getElementById('btn-' + downloadId);
            var progressContainer = document.getElementById('progress-container-' + downloadId);
            var statusMessage = document.getElementById('status-' + downloadId);

            downloadStates[downloadId] = false;
            button.disabled = false;
            button.classList.remove('downloading');
            button.textContent = 'Download APK';
            progressContainer.style.display = 'none';
            
            statusMessage.textContent = 'Error: ' + errorMsg;
            statusMessage.classList.add('error-msg');
            statusMessage.style.display = 'block';
        }

        function triggerDownload(url) {
            var link = document.createElement('a');
            link.href = url;
            link.download = url.split('/').pop();
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function showError(message) {
            document.getElementById('content').innerHTML = '<div class="error">' + escapeHtml(message) + '</div>';
        }

        function updateLastModified() {
            var date = new Date();
            document.getElementById('lastUpdate').textContent = date.toLocaleString();
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', fetchReleases);
        } else {
            fetchReleases();
        }

        // Refresh every 5 minutes
        setInterval(fetchReleases, 5 * 60 * 1000);
    </script>
</body>
</html>

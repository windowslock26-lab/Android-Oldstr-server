<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Android Oldstr - APK Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #4a3f8f;
            background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            line-height: 1.4;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 5px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            padding: 20px 10px;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.3);
            word-wrap: break-word;
        }

        .header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 30px 10px;
            font-size: 1em;
        }

        .error {
            background-color: #d9534f;
            color: white;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            border-radius: 4px;
            font-size: 0.95em;
            word-wrap: break-word;
        }

        .error small {
            display: block;
            margin-top: 6px;
            opacity: 0.85;
            font-size: 0.85em;
        }

        .retry-btn {
            display: inline-block;
            margin-top: 10px;
            background: white;
            color: #d9534f;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
        }

        .apps-list {
            margin-bottom: 20px;
        }

        .app-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .app-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            margin-right: 12px;
            color: white;
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }

        .app-info {
            flex: 1;
            min-width: 0;
        }

        .app-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            word-wrap: break-word;
        }

        .app-package {
            font-size: 0.8em;
            color: #999;
            word-wrap: break-word;
        }

        .app-version {
            font-size: 0.85em;
            color: #666;
            margin-top: 2px;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95em;
            text-decoration: none;
            display: block;
            text-align: center;
            width: 100%;
            -webkit-appearance: none;
            -webkit-border-radius: 4px;
            -webkit-tap-highlight-color: rgba(0,0,0,0.1);
        }

        .download-btn:active {
            opacity: 0.8;
        }

        .no-apps {
            text-align: center;
            color: white;
            padding: 30px 10px;
            font-size: 1em;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 15px 10px;
            font-size: 0.8em;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .footer-text {
            word-wrap: break-word;
            margin: 4px 0;
        }

        @media screen and (max-width: 480px) {
            .header h1 {
                font-size: 1.5em;
            }

            .app-card {
                padding: 12px;
                margin-bottom: 12px;
            }

            .app-icon {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Android Oldstr Store</h1>
            <p>Retro Android Applications</p>
        </div>

        <div id="content">
            <div class="loading">Loading applications...</div>
        </div>

        <div class="footer">
            <div class="footer-text">Last updated: <span id="lastUpdate">-</span></div>
            <div class="footer-text">Android Oldstr - Powered by GitHub</div>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------------
        // Android Oldstr Store - simplified for old WebView (KitKat 4.4+)
        //
        // Changes vs. the original version:
        // 1. No JSZip / axml / GitHub API calls. We read the static
        //    apps-manifest.json that extract-apk-metadata.sh already
        //    generates on every release. Old WebView JS engines choke on
        //    ES6 code that some npm bundles ship (arrow functions,
        //    classes, native Promise-dependent code), so removing those
        //    dependencies removes that failure mode entirely.
        // 2. Several manifest URLs are tried in order. If one host's
        //    TLS certificate isn't trusted by the old Android cert
        //    store, the next one is tried automatically.
        // 3. Downloads are plain navigation to the direct APK URL
        //    (window.location), not Blob + <a download>. The `download`
        //    attribute and URL.createObjectURL()-based saving are not
        //    reliably supported on Chromium ~30 (Android 4.4's WebView),
        //    so this lets Android's own Download Manager handle the file
        //    instead, which always works.
        // ---------------------------------------------------------------

        var REPO_OWNER = 'windowslock26-lab';
        var REPO_NAME = 'Android-Oldstr-server';
        var BRANCH = 'main';

        // Tried in order, first one that succeeds wins.
        var MANIFEST_URLS = [
            'https://raw.githubusercontent.com/' + REPO_OWNER + '/' + REPO_NAME + '/' + BRANCH + '/apps-manifest.json',
            'https://cdn.jsdelivr.net/gh/' + REPO_OWNER + '/' + REPO_NAME + '@' + BRANCH + '/apps-manifest.json'
        ];

        function fetchManifest(urlIndex) {
            if (urlIndex >= MANIFEST_URLS.length) {
                showError(
                    'Could not load the app list from any source.',
                    'This is usually a certificate/TLS problem on old Android versions, ' +
                    'or no internet connection. Check adb logcat for "SSLHandshakeException" ' +
                    'or "CertPathValidatorException" for confirmation.'
                );
                return;
            }

            var url = MANIFEST_URLS[urlIndex];
            var xhr = new XMLHttpRequest();

            try {
                xhr.open('GET', url, true);
            } catch (e) {
                fetchManifest(urlIndex + 1);
                return;
            }

            xhr.timeout = 15000;

            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        displayApps(data.apps || []);
                        updateLastModified();
                    } catch (e) {
                        // bad JSON from this host, try next
                        fetchManifest(urlIndex + 1);
                    }
                } else {
                    fetchManifest(urlIndex + 1);
                }
            };

            xhr.onerror = function() {
                // network / TLS / cert error landed here - try next host
                fetchManifest(urlIndex + 1);
            };

            xhr.ontimeout = function() {
                fetchManifest(urlIndex + 1);
            };

            try {
                xhr.send();
            } catch (e) {
                fetchManifest(urlIndex + 1);
            }
        }

        function displayApps(apps) {
            var content = document.getElementById('content');

            if (!apps || apps.length === 0) {
                content.innerHTML = '<div class="no-apps">No apps found.<br>Add APKs to a GitHub release.</div>';
                return;
            }

            var html = '<div class="apps-list">';

            for (var i = 0; i < apps.length; i++) {
                var app = apps[i];
                var iconHTML = app.icon
                    ? '<img src="' + escapeAttr(app.icon) + '" alt="icon">'
                    : '\uD83D\uDCE6';

                html += '<div class="app-card">' +
                    '<div class="app-header">' +
                        '<div class="app-icon">' + iconHTML + '</div>' +
                        '<div class="app-info">' +
                            '<div class="app-name">' + escapeHtml(app.name || 'Unknown App') + '</div>' +
                            '<div class="app-package">' + escapeHtml(app.package || '') + '</div>' +
                            '<div class="app-version">v' + escapeHtml(app.version || '1.0') + ' \u2022 ' + escapeHtml(String(app.size || '?')) + ' MB</div>' +
                        '</div>' +
                    '</div>' +
                    '<a class="download-btn" href="' + escapeAttr(app.downloadUrl) + '">Download</a>' +
                '</div>';
            }

            html += '</div>';
            content.innerHTML = html;
        }

        function showError(message, detail) {
            var html = '<div class="error">' + escapeHtml(message);
            if (detail) {
                html += '<small>' + escapeHtml(detail) + '</small>';
            }
            html += '<br><a class="retry-btn" href="javascript:location.reload();">Retry</a></div>';
            document.getElementById('content').innerHTML = html;
        }

        function updateLastModified() {
            var date = new Date();
            document.getElementById('lastUpdate').textContent = date.toLocaleString();
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(String(text)));
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() { fetchManifest(0); });
        } else {
            fetchManifest(0);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Android Oldstr - APK Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #4a3f8f;
            background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            line-height: 1.4;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 5px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            padding: 20px 10px;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.3);
            word-wrap: break-word;
        }

        .header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 30px 10px;
            font-size: 1em;
        }

        .error {
            background-color: #d9534f;
            color: white;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            border-radius: 4px;
            font-size: 0.95em;
            word-wrap: break-word;
        }

        .apps-list {
            margin-bottom: 20px;
        }

        .app-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .app-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
            margin-right: 12px;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-icon.fallback {
            font-size: 32px;
            display: flex;
        }

        .app-info {
            flex-grow: 1;
        }

        .app-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
            word-wrap: break-word;
        }

        .app-package {
            color: #999;
            font-size: 0.75em;
            margin-bottom: 3px;
            word-wrap: break-word;
        }

        .app-version {
            color: #666;
            font-size: 0.85em;
        }

        .download-section {
            margin-top: 12px;
        }

        .progress-container {
            display: none;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 18px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.2s ease;
        }

        .progress-text {
            font-size: 0.8em;
            color: #666;
            text-align: center;
        }

        .status-message {
            font-size: 0.85em;
            color: #28a745;
            text-align: center;
            margin-bottom: 8px;
            display: none;
        }

        .status-message.error-msg {
            color: #d9534f;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95em;
            text-decoration: none;
            display: block;
            text-align: center;
            width: 100%;
            -webkit-appearance: none;
            -webkit-border-radius: 4px;
            -webkit-tap-highlight-color: rgba(0,0,0,0.1);
        }

        .download-btn:active {
            opacity: 0.8;
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .download-btn.downloading {
            background: #f0ad4e;
        }

        .download-btn.completed {
            background: #28a745;
        }

        .no-apps {
            text-align: center;
            color: white;
            padding: 30px 10px;
            font-size: 1em;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 15px 10px;
            font-size: 0.8em;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .footer-text {
            word-wrap: break-word;
            margin: 4px 0;
        }

        @media screen and (max-width: 480px) {
            .header h1 {
                font-size: 1.5em;
            }

            .app-card {
                padding: 12px;
                margin-bottom: 12px;
            }

            .app-icon {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Android Oldstr Store</h1>
            <p>Retro Android Applications</p>
        </div>

        <div id="content">
            <div class="loading">Loading applications...</div>
        </div>

        <div class="footer">
            <div class="footer-text">Last updated: <span id="lastUpdate">-</span></div>
            <div class="footer-text">Android Oldstr - Powered by GitHub</div>
        </div>
    </div>

    <script>
        var REPO_OWNER = 'windowslock26-lab';
        var REPO_NAME = 'Android-Oldstr-server';
        var MANIFEST_URL = 'https://raw.githubusercontent.com/' + REPO_OWNER + '/' + REPO_NAME + '/main/docs/apps-manifest.json';
        var downloadStates = {};

        function fetchAppsManifest() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', MANIFEST_URL + '?t=' + Date.now(), true);
            xhr.timeout = 8000;
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var manifest = JSON.parse(xhr.responseText);
                        displayApps(manifest.apps || []);
                        updateLastModified();
                    } catch(e) {
                        showError('Error parsing app manifest');
                    }
                } else {
                    showError('Failed to load apps: HTTP ' + xhr.status);
                }
            };

            xhr.onerror = function() {
                showError('Network error. Check your connection.');
            };

            xhr.ontimeout = function() {
                showError('Request timeout. Try again.');
            };

            xhr.send();
        }

        function displayApps(apps) {
            var content = document.getElementById('content');

            if (!apps || apps.length === 0) {
                content.innerHTML = '<div class="no-apps">No APK files found.<br>Update apps-manifest.json</div>';
                return;
            }

            var appsHTML = '';
            for (var i = 0; i < apps.length; i++) {
                var app = apps[i];
                var downloadId = 'download-' + i;

                var iconHTML = '<div class="fallback">📦</div>';
                if (app.icon && app.icon.length > 0) {
                    iconHTML = '<img src="' + escapeHtml(app.icon) + '" alt="icon">';
                }

                appsHTML += '<div class="app-card">' +
                    '<div class="app-header">' +
                    '<div class="app-icon">' + iconHTML + '</div>' +
                    '<div class="app-info">' +
                    '<div class="app-name">' + escapeHtml(app.name || 'Unknown App') + '</div>' +
                    '<div class="app-package">' + escapeHtml(app.package || 'com.unknown') + '</div>' +
                    '<div class="app-version">v' + escapeHtml(app.version || '1.0') + ' • ' + app.size + ' MB</div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="download-section">' +
                    '<div class="status-message" id="status-' + downloadId + '"></div>' +
                    '<div class="progress-container" id="progress-container-' + downloadId + '">' +
                    '<div class="progress-bar">' +
                    '<div class="progress-fill" id="progress-fill-' + downloadId + '"></div>' +
                    '</div>' +
                    '<div class="progress-text" id="progress-text-' + downloadId + '">0%</div>' +
                    '</div>' +
                    '<button class="download-btn" id="btn-' + downloadId + '" onclick="startDownload(\'" + escapeAttr(app.downloadUrl) + "\', \'" + downloadId + "\', \'" + escapeAttr(app.filename) + "\')\"Download</button>' +
                    '</div>' +
                    '</div>';
            }

            content.innerHTML = '<div class="apps-list">' + appsHTML + '</div>';
        }

        function startDownload(url, downloadId, filename) {
            var button = document.getElementById('btn-' + downloadId);
            var progressContainer = document.getElementById('progress-container-' + downloadId);
            var statusMessage = document.getElementById('status-' + downloadId);

            if (button.classList.contains('completed')) {
                triggerDownload(url, filename);
                return;
            }

            if (downloadStates[downloadId]) {
                return;
            }

            downloadStates[downloadId] = true;
            button.disabled = true;
            button.classList.add('downloading');
            button.textContent = 'Downloading...';
            progressContainer.style.display = 'block';
            statusMessage.style.display = 'none';

            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'blob';

            xhr.onprogress = function(e) {
                if (e.lengthComputable) {
                    var percent = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('progress-fill-' + downloadId).style.width = percent + '%';
                    document.getElementById('progress-text-' + downloadId).textContent = percent + '%';
                }
            };

            xhr.onload = function() {
                if (xhr.status === 200) {
                    var blob = xhr.response;
                    var link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    try {
                        URL.revokeObjectURL(link.href);
                    } catch(e) {}

                    downloadStates[downloadId] = false;
                    button.classList.remove('downloading');
                    button.classList.add('completed');
                    button.textContent = 'Downloaded ✓';
                    progressContainer.style.display = 'none';
                    
                    statusMessage.textContent = 'Downloaded successfully!';
                    statusMessage.classList.remove('error-msg');
                    statusMessage.style.display = 'block';
                } else {
                    handleDownloadError(downloadId, 'HTTP ' + xhr.status);
                }
            };

            xhr.onerror = function() {
                handleDownloadError(downloadId, 'Network error');
            };

            xhr.ontimeout = function() {
                handleDownloadError(downloadId, 'Timeout');
            };

            xhr.send();
        }

        function handleDownloadError(downloadId, errorMsg) {
            var button = document.getElementById('btn-' + downloadId);
            var progressContainer = document.getElementById('progress-container-' + downloadId);
            var statusMessage = document.getElementById('status-' + downloadId);

            downloadStates[downloadId] = false;
            button.disabled = false;
            button.classList.remove('downloading');
            button.textContent = 'Download';
            progressContainer.style.display = 'none';
            
            statusMessage.textContent = 'Error: ' + errorMsg;
            statusMessage.classList.add('error-msg');
            statusMessage.style.display = 'block';
        }

        function triggerDownload(url, filename) {
            var link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function showError(message) {
            document.getElementById('content').innerHTML = '<div class="error">' + escapeHtml(message) + '</div>';
        }

        function updateLastModified() {
            var date = new Date();
            document.getElementById('lastUpdate').textContent = date.toLocaleString();
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', fetchAppsManifest);
        } else {
            fetchAppsManifest();
        }

        setInterval(fetchAppsManifest, 5 * 60 * 1000);
    </script>
</body>
</html>
